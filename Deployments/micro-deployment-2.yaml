apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-deployment-2
  labels:
    app: micro-deployment-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: micro-deployment-2
  template:
    metadata:
      labels:
        app: micro-deployment-2
    spec:
      containers:
      - name: micro-deploment-2
        image: b00mgr3rt/micro-deployment-2:v1
        ports:
        - containerPort: 8080
