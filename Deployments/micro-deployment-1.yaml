apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-deployment-1
  labels:
    app: micro-deployment-1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: micro-deployment-1
  template:
    metadata:
      labels:
        app: micro-deployment1
    spec:
      containers:
      - name: micro-deployment1
        image: b00mgr3rt/micro-deployment-1:v1
        ports:
        - containerPort: 8000
